<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #2a2a2a; display: flex; align-items: flex-end; justify-content: center; height: 100vh; }
  .sidebar-bottom {
    width: 200px;
    background: #111;
    border-radius: 10px 10px 0 0;
    padding-bottom: 0;
    overflow: hidden;
  }
  .nav-label {
    padding: 10px 16px 4px;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
  }
  .sidebar-quick-links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 4px 16px 14px;
  }
  .ql-btn {
    flex: 1;
    min-width: calc(33% - 6px);
    padding: 5px 0;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 5px;
    color: #888;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-align: center;
    transition: color 0.12s, border-color 0.12s;
  }
  .ql-btn:hover { color: #e5e7eb; border-color: #555; }
  .sidebar-footer {
    padding: 10px 20px;
    color: #333;
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    border-top: 1px solid #1a1a1a;
  }
</style>
</head>
<body>
  <div class="sidebar-bottom">
    <div class="nav-label">Quick Links</div>
    <div class="sidebar-quick-links">
      <button class="ql-btn">G-D</button>
      <button class="ql-btn">W</button>
      <button class="ql-btn">SQ</button>
      <button class="ql-btn">FX</button>
      <button class="ql-btn">DB</button>
    </div>
    <div class="sidebar-footer">v1.0.0</div>
  </div>
</body>
</html>
